name: Deploy

on:
  workflow_call:
    inputs:
      env:
        description: 'which environment to deploy to'
        required: true
        type: string
      slackbot_image_tag:
        description: 'the slackbot tag to deploy'
        type: string
        required: true
      image_tag:
        description: 'the app tag to deploy'
        type: string
        required: true
    secrets:
      kube_namespace:
        description: 'the kubernetes namespace to deploy to'
        required: true
      kube_cert:
        description: 'cert used to verify identity to cluster'
        required: true
      kube_cluster:
        description: 'address of the cluster to connect to'
        required: true
      kube_token:
        description: 'used to authenticate to the cluster'
        required: true
      ecr_url:
        description: 'the url for the ecr repo, where the image is pulled from'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    permissions:
      contents: read
    steps:
        - name: Checkout
          uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

        - name: Set cluster
          id: set-cluster
          shell: bash
          run: |
              echo "CLUSTER=live" >> $GITHUB_OUTPUT
              echo "INGRESS_COLOUR=green" >> $GITHUB_OUTPUT

        - name: Create cert certificate-authority
          id: create-cert-authority
          shell: bash
          run: echo "${{ secrets.kube_cert }}" > ca.crt

        - name: Authenticate to the cluster
          shell: bash
          id: authenticate
          env:
            KUBE_CLUSTER: ${{ secrets.kube_cluster }}
          run: |
            kubectl config set-cluster "${KUBE_CLUSTER}" --certificate-authority=ca.crt --server="${KUBE_CLUSTER}"
            kubectl config set-credentials deploy-user --token="${{ secrets.kube_token }}"
            kubectl config set-context "${KUBE_CLUSTER}" --cluster="${KUBE_CLUSTER}" --user=deploy-user --namespace="${{ secrets.kube_namespace }}"
            kubectl config use-context "${KUBE_CLUSTER}"

            # export flat kube config so helm image can read it
            echo 'FLAT_KUBE_CONFIG<<EOF' >> $GITHUB_ENV
            kubectl config view --flatten >> $GITHUB_ENV
            echo 'EOF' >> $GITHUB_ENV

        - name: Deploy image to K8 cloud-platform-hammer-bot (${{ inputs.env }}) namespace
          id: deploy-image
          shell: bash
          env:
            KUBECONFIG_FILE: ${{ env.FLAT_KUBE_CONFIG }}
            ECR_URL: ${{ secrets.ecr_url }}
            IMAGE_TAG: ${{ inputs.image_tag }}
            SLACKBOT_IMAGE_TAG: ${{ inputs.slackbot_image_tag }}
            CLUSTER: ${{ steps.set-cluster.outputs.CLUSTER }}
            KUBE_NAMESPACE: ${{ secrets.kube_namespace }}
            INGRESS_COLOUR: ${{ steps.set-cluster.outputs.INGRESS_COLOUR }}
          run: |
            KUBECONFIG_TEMP=$(mktemp)
            echo "$KUBECONFIG_FILE" > "$KUBECONFIG_TEMP"
            export KUBECONFIG="$KUBECONFIG_TEMP"

            VALUES_TEMP=$(mktemp --suffix=.yaml)
            cat > "$VALUES_TEMP" << EOF
            ecrUrl: "${ECR_URL}"
            imageTag: "${IMAGE_TAG}"
            slackbotImageTag: "${SLACKBOT_IMAGE_TAG}"
            cluster: "${CLUSTER}"
            ingressIdentifier: "api-${KUBE_NAMESPACE}-${INGRESS_COLOUR}"
            namespace: "${KUBE_NAMESPACE}"
            securityContext:
              allowPrivilegeEscalation: false
              seccompProfile:
                type: RuntimeDefault
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
            EOF

            helm upgrade --install hammer-bot deploy \
              --namespace "${KUBE_NAMESPACE}" \
              --values "$VALUES_TEMP"

            rm -f "$KUBECONFIG_TEMP" "$VALUES_TEMP"